# MAKE SURE THE "version:" LINE IS GONE FROM THE TOP!

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ent_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: ent_test
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      # THIS LINE MUST BE CORRECT
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --password=password"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
      
  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # THIS IS THE NEW, MORE ROBUST COMMAND
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand(\"ping\")' | grep -q '\"ok\" : 1'"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
volumes:
  mongo-data:
